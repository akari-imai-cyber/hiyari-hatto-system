<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報告管理画面 - ヒヤリハットナビ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/admin-reports.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase クライアント -->
    <script src="js/config.js?v=20260301a"></script>
    
    <!-- Supabase Auth 認証システム -->
    <script src="js/auth-supabase.js?v=20260317005"></script>
    
    <!-- 認証チェック実行 -->
    <script>
    (async function() {
        // Supabaseクライアント初期化を待つ
        if (typeof initializeApp === 'function') {
            initializeApp();
        }
        
        const authenticated = await checkAuthentication();
        if (!authenticated) {
            // アクセス拒否の場合は処理が中断される
        }
    })();
    </script>
    
    <!-- 共通ナビゲーション -->
    <script src="js/common-navigation.js?v=20260411"></script>
    
    <!-- ページ固有の初期化 -->
    <script>
    window.addEventListener('authComplete', function(e) {
        const auth = e.detail;
        // company_id をグローバルに保存（後で使用）
        window.currentUserCompanyId = auth.companyId;
        window.currentUserRole = auth.role;
    });
    
    async function handleLogout() {
        if (confirm('ログアウトしますか？')) {
            await window.supabaseClient.auth.signOut();
            alert('ログアウトしました');
            location.reload();
        }
    }
    </script>
</head>
<body>
    <!-- ヘッダー -->
    <header class="header">
        <div class="header-content">
            <a href="landing.html" class="back-to-top">← トップページに戻る</a>
            <h1 class="logo">🚛 ヒヤリハットナビ</h1>
            <div class="header-right">
                <div id="user-info" class="user-info" style="display: none;">
                    <span class="user-company" id="display-company">読み込み中...</span>
                    <span class="user-email" id="display-email">読み込み中...</span>
                    <button class="btn-logout" onclick="handleLogout()" title="ログアウト">🚪</button>
                </div>
                <nav class="nav">
                    <a href="index.html" class="nav-link">報告入力</a>
                    <a href="dashboard.html" class="nav-link">ダッシュボード</a>
                    <a href="analytics.html" class="nav-link">分析</a>
                    <a href="admin.html" class="nav-link" id="admin-link">企業管理</a>
                    <a href="admin-reports.html" class="nav-link active" id="admin-reports-link">報告管理</a>
                    <a href="admin-users.html" class="nav-link" id="admin-users-link">ユーザー管理</a>
                    <a href="import-data.html" class="nav-link" id="import-data-link">📥 データインポート</a>
                    <a href="admin-data-fix.html" class="nav-link" id="data-fix-link">🔧 データ修正</a>
                </nav>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="admin-container">
        <!-- ヘッダー -->
        <div class="admin-header">
            <h1>📝 報告管理画面</h1>
            <p>全企業の報告を閲覧・編集できます（管理者専用）</p>
        </div>

        <!-- フィルター -->
        <div class="card">
            <div class="filter-controls">
                <select id="company-filter" class="form-control">
                    <option value="">すべての企業</option>
                </select>
                <select id="status-filter" class="form-control">
                    <option value="">すべてのステータス</option>
                    <option value="step1_complete">基本情報のみ</option>
                    <option value="step2_complete">詳細入力済</option>
                    <option value="confirmed">確認済</option>
                </select>
                <button class="btn btn-primary" onclick="loadReports()">🔄 更新</button>
            </div>
        </div>

        <!-- 統計カード -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">総報告数</div>
                <div class="stat-value" id="total-reports">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-label">未確認</div>
                <div class="stat-value" id="pending-reports">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔴</div>
                <div class="stat-label">修正依頼</div>
                <div class="stat-value" id="edit-requests">0</div>
            </div>
        </div>

        <!-- 報告一覧 -->
        <div class="card">
            <h2 class="section-title">報告一覧</h2>
            <div id="reports-list">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2026 NLP協同組合</p>
    </footer>

    <!-- 編集モーダル -->
    <div id="edit-report-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>📝 報告を編集</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body" id="edit-modal-body">
                <!-- 編集フォームが動的に挿入されます -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">キャンセル</button>
                <button class="btn btn-primary" onclick="saveReport()">💾 保存</button>
            </div>
        </div>
    </div>

    <script src="js/admin-reports.js?v=20260301a"></script>
</body>
</html>
