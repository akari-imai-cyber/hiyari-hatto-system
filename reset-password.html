<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード再設定 - ヒヤリハットナビ</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 24px;
            color: #2563eb;
            margin-bottom: 10px;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
        }

        h2 {
            font-size: 28px;
            color: #1e293b;
            margin-bottom: 10px;
            text-align: center;
        }

        .description {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #334155;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Noto Sans JP', sans-serif;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .btn-primary:hover {
            background: #1e40af;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .password-requirements {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
            padding-left: 4px;
        }

        .password-requirements li {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo">
            <h1>🚛 ヒヤリハットナビ</h1>
            <p>物流・運送業界の安全を守る</p>
        </div>

        <h2>パスワード再設定</h2>
        <p class="description">新しいパスワードを入力してください</p>

        <div id="message" class="message"></div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #64748b;">処理中...</p>
        </div>

        <form id="reset-form" style="display: none;">
            <div class="form-group">
                <label for="new-password">新しいパスワード</label>
                <input type="password" id="new-password" name="password" required 
                       minlength="8" placeholder="8文字以上で入力してください">
                <ul class="password-requirements">
                    <li>✓ 8文字以上</li>
                    <li>✓ 英字と数字を含めることを推奨</li>
                </ul>
            </div>

            <div class="form-group">
                <label for="confirm-password">パスワード（確認）</label>
                <input type="password" id="confirm-password" name="confirm" required 
                       minlength="8" placeholder="もう一度入力してください">
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">
                パスワードを変更
            </button>
        </form>

        <div class="back-link">
            <a href="index.html">← ログイン画面に戻る</a>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        const messageEl = document.getElementById('message');
        const loadingEl = document.getElementById('loading');
        const formEl = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');

        // メッセージ表示関数
        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type} show`;
        }

        // URLからアクセストークンを取得
        function getAccessToken() {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            return hashParams.get('access_token');
        }

        // 初期化
        async function init() {
            const accessToken = getAccessToken();

            if (!accessToken) {
                showMessage('❌ 無効なリセットリンクです。もう一度パスワードリセットをリクエストしてください。', 'error');
                loadingEl.style.display = 'none';
                return;
            }

            // Supabaseクライアント初期化
            if (!window.supabaseClient) {
                if (typeof initializeApp === 'function') {
                    await initializeApp();
                } else {
                    const { createClient } = supabase;
                    window.supabaseClient = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
                }
            }

            // トークンでセッションを設定
            try {
                const { data, error } = await window.supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: getRefreshToken() || ''
                });

                if (error) throw error;

                // フォーム表示
                loadingEl.style.display = 'none';
                formEl.style.display = 'block';
                console.log('✅ セッション確立成功');

            } catch (error) {
                console.error('セッション確立エラー:', error);
                showMessage('❌ セッションの確立に失敗しました: ' + error.message, 'error');
                loadingEl.style.display = 'none';
            }
        }

        function getRefreshToken() {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            return hashParams.get('refresh_token');
        }

        // フォーム送信
        formEl.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // パスワード一致確認
            if (newPassword !== confirmPassword) {
                showMessage('❌ パスワードが一致しません', 'error');
                return;
            }

            // パスワード長さ確認
            if (newPassword.length < 8) {
                showMessage('❌ パスワードは8文字以上で入力してください', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '処理中...';

            try {
                // パスワード更新
                const { data, error } = await window.supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                showMessage('✅ パスワードを変更しました！3秒後にログイン画面に移動します...', 'success');
                
                // 3秒後にログイン画面へ
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);

            } catch (error) {
                console.error('パスワード変更エラー:', error);
                showMessage('❌ パスワード変更に失敗しました: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'パスワードを変更';
            }
        });

        // ページ読み込み時に初期化
        window.addEventListener('DOMContentLoaded', () => {
            loadingEl.style.display = 'block';
            init();
        });
    </script>
</body>
</html>
