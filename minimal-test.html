<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小テスト - カテゴリ選択</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { margin-bottom: 20px; color: #333; }
        .btn-group { display: flex; gap: 10px; margin: 20px 0; }
        .btn { padding: 15px 30px; font-size: 16px; border: 2px solid #2563eb; background: white; color: #2563eb; border-radius: 8px; cursor: pointer; }
        .btn.active { background: #2563eb; color: white; }
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin: 20px 0; }
        .cat-btn { padding: 15px; border: 2px solid #ccc; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .cat-btn:hover { border-color: #2563eb; background: #eff6ff; }
        .cat-btn.selected { background: #2563eb; color: white; border-color: #2563eb; }
        .result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
        .log { margin-top: 20px; padding: 15px; background: #1e1e1e; color: #00ff00; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 カテゴリ選択 - 最小テスト</h1>
        
        <div class="btn-group">
            <button class="btn" onclick="test('driving')">🚛 走行中</button>
            <button class="btn" onclick="test('loading')">📦 荷役中</button>
        </div>
        
        <div id="category-area" style="display: none;">
            <h3>カテゴリを選択してください（複数選択可）</h3>
            <div id="buttons" class="category-grid"></div>
        </div>
        
        <div class="result">
            <strong>選択結果:</strong>
            <div id="result">何も選択されていません</div>
        </div>
        
        <div class="log" id="log">ログが表示されます...</div>
    </div>

    <script>
        // ログ関数
        function log(msg) {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${msg}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        // カテゴリ配列
        const DRIVING = [
            '急ブレーキ・急ハンドル',
            '車両との接触寸前',
            '歩行者・自転車との接触寸前',
            '見落とし・確認ミス',
            'バック・方向転換時のニアミス',
            '車線変更・合流ヒヤリ',
            '踏切・交差点ヒヤリ',
            'その他'
        ];

        const LOADING = [
            '荷崩れ・落下寸前',
            '転倒・つまずき・滑り',
            '挟まれ・巻き込まれ寸前',
            '機材との接触',
            '荷物の破損寸前',
            'その他'
        ];

        // ページ読み込み時
        window.addEventListener('load', function() {
            log('✅ ページ読み込み完了');
            log('走行中カテゴリ数: ' + DRIVING.length);
            log('荷役中カテゴリ数: ' + LOADING.length);
        });

        // テスト関数
        function test(type) {
            log('==========');
            log('📌 ' + type + ' を選択');
            
            const area = document.getElementById('category-area');
            const container = document.getElementById('buttons');
            
            if (!area || !container) {
                log('❌ エラー: 要素が見つかりません');
                return;
            }
            
            container.innerHTML = '';
            const cats = type === 'driving' ? DRIVING : LOADING;
            log('カテゴリ数: ' + cats.length);
            
            cats.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.textContent = cat;
                btn.onclick = function() {
                    this.classList.toggle('selected');
                    updateResult();
                    log('クリック: ' + cat);
                };
                container.appendChild(btn);
            });
            
            area.style.display = 'block';
            log('✅ ' + cats.length + '個のボタンを表示');
            
            // ボタンのアクティブ状態更新
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function updateResult() {
            const selected = Array.from(document.querySelectorAll('.cat-btn.selected'))
                .map(b => b.textContent);
            
            const resultDiv = document.getElementById('result');
            if (selected.length > 0) {
                resultDiv.innerHTML = selected.map(s => '✓ ' + s).join('<br>');
            } else {
                resultDiv.textContent = '何も選択されていません';
            }
        }
    </script>
</body>
</html>
