<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードリセット - ヒヤリハットナビ</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .reset-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .reset-header p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #2980b9;
        }

        .btn-submit:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #3498db;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .info-box {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .info-box h3 {
            margin: 0 0 10px 0;
            color: #0066cc;
            font-size: 16px;
        }

        .info-box ul {
            margin: 0;
            padding-left: 20px;
        }

        .info-box li {
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>🔑 パスワードリセット</h1>
            <p>登録されているメールアドレスを入力してください。<br>パスワードリセット用のリンクをお送りします。</p>
        </div>

        <div id="success-message" class="success-message"></div>
        <div id="error-message" class="error-message"></div>

        <form id="reset-form">
            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="your-email@example.com"
                    autocomplete="email"
                >
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                リセットメールを送信
            </button>
        </form>

        <div class="info-box" style="margin-top: 20px;">
            <h3>📧 受信後の手順</h3>
            <ul>
                <li>受信したメール内のリンクをクリック</li>
                <li>新しいパスワードを入力</li>
                <li>パスワードリセット完了</li>
            </ul>
            <p style="margin: 10px 0 0 0; font-size: 13px; color: #666;">
                ※ リセットリンクの有効期限は24時間です。<br>
                ※ メールが届かない場合は迷惑メールフォルダをご確認ください。
            </p>
        </div>

        <a href="index.html" class="back-link">← ログインページに戻る</a>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>

    <script>
        // Supabaseクライアント初期化
        let supabaseClient;

        document.addEventListener('DOMContentLoaded', function() {
            // Supabaseクライアント初期化
            if (typeof initializeApp === 'function') {
                initializeApp();
                supabaseClient = window.supabaseClient;
            } else {
                console.error('Supabase初期化関数が見つかりません');
                showError('システムエラーが発生しました。ページをリロードしてください。');
            }

            // フォーム送信
            document.getElementById('reset-form').addEventListener('submit', handleSubmit);
        });

        async function handleSubmit(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const submitBtn = document.getElementById('submit-btn');

            // バリデーション
            if (!email) {
                showError('メールアドレスを入力してください。');
                return;
            }

            // メールアドレス形式チェック
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('正しいメールアドレスを入力してください。');
                return;
            }

            // ボタン無効化
            submitBtn.disabled = true;
            submitBtn.textContent = '送信中...';

            try {
                // Supabaseのパスワードリセットメール送信
                const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}/reset-password.html`
                });

                if (error) {
                    throw error;
                }

                // 成功メッセージ表示
                showSuccess(`パスワードリセット用のメールを ${email} に送信しました。\n\nメールに記載されたリンクをクリックして、パスワードをリセットしてください。`);

                // フォームをクリア
                document.getElementById('reset-form').reset();

            } catch (error) {
                console.error('パスワードリセットエラー:', error);
                
                // ユーザーフレンドリーなエラーメッセージ
                let errorMessage = 'パスワードリセットメールの送信に失敗しました。';
                
                if (error.message.includes('User not found')) {
                    errorMessage = 'このメールアドレスは登録されていません。';
                } else if (error.message.includes('Email rate limit exceeded')) {
                    errorMessage = 'メール送信の回数制限に達しました。しばらく待ってから再試行してください。';
                }
                
                showError(errorMessage);
            } finally {
                // ボタンを有効化
                submitBtn.disabled = false;
                submitBtn.textContent = 'リセットメールを送信';
            }
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            const errorDiv = document.getElementById('error-message');
            
            errorDiv.style.display = 'none';
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            
            // ページ上部にスクロール
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showError(message) {
            const successDiv = document.getElementById('success-message');
            const errorDiv = document.getElementById('error-message');
            
            successDiv.style.display = 'none';
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // ページ上部にスクロール
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
