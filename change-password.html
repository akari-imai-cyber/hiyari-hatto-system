<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード変更 - ヒヤリハットナビ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .password-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .password-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .password-card h2 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .password-card p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .form-group small {
            display: block;
            margin-top: 5px;
            color: #6b7280;
            font-size: 0.875rem;
        }
        
        .password-strength {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.875rem;
            display: none;
        }
        
        .password-strength.weak {
            background: #fee;
            color: #c00;
            display: block;
        }
        
        .password-strength.medium {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        
        .password-strength.strong {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .btn-change {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-change:hover {
            background: #1d4ed8;
        }
        
        .btn-change:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: #2563eb;
            text-decoration: none;
            border: 1px solid #2563eb;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .btn-back:hover {
            background: #2563eb;
            color: white;
        }
    </style>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Config -->
    <script src="js/config.js?v=20260411"></script>
    
    <!-- Auth -->
    <script src="js/auth-supabase.js?v=20260411"></script>
    
    <!-- 認証チェック実行 -->
    <script>
    (async function() {
        if (typeof initializeApp === 'function') {
            initializeApp();
        }
        
        const authenticated = await checkAuthentication();
        if (!authenticated) {
            // アクセス拒否の場合は処理が中断される
        }
    })();
    </script>
    
    <!-- 共通ナビゲーション -->
    <script src="js/common-navigation.js?v=20260411"></script>
    
    <!-- ログアウト処理 -->
    <script>
    async function handleLogout() {
        if (confirm('ログアウトしますか？')) {
            await window.supabaseClient.auth.signOut();
            alert('ログアウトしました');
            location.reload();
        }
    }
    </script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <a href="landing.html" class="back-to-top">← トップページに戻る</a>
                <h1 class="logo">🚛 ヒヤリハットナビ</h1>
                <div class="header-right">
                    <div id="user-info" class="user-info" style="display: none;">
                        <span class="user-company" id="display-company">読み込み中...</span>
                        <span class="user-email" id="display-email">読み込み中...</span>
                        <button class="btn-logout" onclick="handleLogout()" title="ログアウト">🚪</button>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav-link">報告入力</a>
                        <a href="dashboard.html" class="nav-link">ダッシュボード</a>
                        <a href="analytics.html" class="nav-link">分析</a>
                        <a href="admin.html" class="nav-link" id="admin-link">企業管理</a>
                        <a href="admin-reports.html" class="nav-link" id="admin-reports-link">報告管理</a>
                        <a href="admin-users.html" class="nav-link" id="admin-users-link">ユーザー管理</a>
                        <a href="import-data.html" class="nav-link" id="import-data-link">📥 データインポート</a>
                        <a href="admin-data-fix.html" class="nav-link" id="data-fix-link">🔧 データ修正</a>
                    </nav>
                </div>
            </div>
        </header>

        <main class="password-container">
            <div class="password-card">
                <h2>🔑 パスワード変更</h2>
                <p>セキュリティ向上のため、定期的にパスワードを変更することをおすすめします。</p>
                
                <form id="password-form" onsubmit="handlePasswordChange(event)">
                    <div class="form-group">
                        <label for="current-password">現在のパスワード *</label>
                        <input type="password" id="current-password" required 
                               placeholder="現在のパスワードを入力">
                    </div>
                    
                    <div class="form-group">
                        <label for="new-password">新しいパスワード *</label>
                        <input type="password" id="new-password" required 
                               placeholder="新しいパスワードを入力"
                               oninput="checkPasswordStrength()">
                        <small>8文字以上、英数字を含めてください</small>
                        <div class="password-strength" id="password-strength"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">新しいパスワード（確認） *</label>
                        <input type="password" id="confirm-password" required 
                               placeholder="もう一度入力してください"
                               oninput="checkPasswordMatch()">
                        <small id="match-message"></small>
                    </div>
                    
                    <button type="submit" class="btn-change" id="submit-btn">
                        パスワードを変更
                    </button>
                </form>
                
                <div class="message" id="message"></div>
                
                <a href="dashboard.html" class="btn-back">← ダッシュボードに戻る</a>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 NLP協同組合</p>
        </footer>
    </div>

    <script>
        // パスワード強度チェック
        function checkPasswordStrength() {
            const password = document.getElementById('new-password').value;
            const strengthDiv = document.getElementById('password-strength');
            
            if (password.length === 0) {
                strengthDiv.style.display = 'none';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            strengthDiv.className = 'password-strength';
            if (strength <= 2) {
                strengthDiv.classList.add('weak');
                strengthDiv.textContent = '⚠️ 弱いパスワードです';
            } else if (strength <= 3) {
                strengthDiv.classList.add('medium');
                strengthDiv.textContent = '✓ 中程度のパスワードです';
            } else {
                strengthDiv.classList.add('strong');
                strengthDiv.textContent = '✓ 強力なパスワードです';
            }
        }
        
        // パスワード一致チェック
        function checkPasswordMatch() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const matchMessage = document.getElementById('match-message');
            
            if (confirmPassword.length === 0) {
                matchMessage.textContent = '';
                matchMessage.style.color = '';
                return;
            }
            
            if (newPassword === confirmPassword) {
                matchMessage.textContent = '✓ パスワードが一致しています';
                matchMessage.style.color = '#155724';
            } else {
                matchMessage.textContent = '✗ パスワードが一致しません';
                matchMessage.style.color = '#721c24';
            }
        }
        
        // パスワード変更処理
        async function handlePasswordChange(event) {
            event.preventDefault();
            
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submit-btn');
            
            // バリデーション
            if (newPassword !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '新しいパスワードが一致しません';
                return;
            }
            
            if (newPassword.length < 8) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'パスワードは8文字以上で入力してください';
                return;
            }
            
            if (newPassword === currentPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '新しいパスワードは現在のパスワードと異なるものを設定してください';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '変更中...';
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            try {
                // 現在のパスワードで再認証
                const { data: { user } } = await window.supabaseClient.auth.getUser();
                if (!user) {
                    throw new Error('ユーザー情報を取得できませんでした');
                }
                
                const email = user.email;
                
                // 現在のパスワードで認証確認
                const { error: signInError } = await window.supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: currentPassword
                });
                
                if (signInError) {
                    throw new Error('現在のパスワードが正しくありません');
                }
                
                // パスワード更新
                const { error: updateError } = await window.supabaseClient.auth.updateUser({
                    password: newPassword
                });
                
                if (updateError) {
                    throw updateError;
                }
                
                // 成功メッセージ
                messageDiv.className = 'message success';
                messageDiv.textContent = '✓ パスワードを変更しました。次回ログインから新しいパスワードをお使いください。';
                
                // フォームをリセット
                document.getElementById('password-form').reset();
                document.getElementById('password-strength').style.display = 'none';
                document.getElementById('match-message').textContent = '';
                
                // 3秒後にダッシュボードにリダイレクト
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 3000);
                
            } catch (error) {
                console.error('パスワード変更エラー:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = '✗ ' + error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'パスワードを変更';
            }
        }
    </script>
</body>
</html>
