<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者ダッシュボード - ヒヤリハットナビ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Supabase JS ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Supabase クライアント -->
    <script src="js/config.js?v=20260228k"></script>
    
    <!-- Supabase Auth 認証システム -->
    <script src="js/auth-supabase.js?v=20260301a"></script>
    
    <!-- 認証チェック実行 -->
    <script>
    (async function() {
        // Supabaseクライアント初期化を待つ
        if (typeof initializeApp === 'function') {
            initializeApp();
        }
        
        const authenticated = await checkAuthentication();
        if (!authenticated) {
            // アクセス拒否の場合は処理が中断される
        }
    })();
    </script>
    
    <!-- 共通ナビゲーション -->
    <script src="js/common-navigation.js?v=20260411e"></script>
    
    <!-- ログアウト処理 -->
    <script>
    async function handleLogout() {
        await window.supabaseClient.auth.signOut();
        window.location.href = 'landing.html';
    }
    </script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <a href="landing.html" class="back-to-top">← トップページに戻る</a>
                <h1 class="logo">🚛 ヒヤリハットナビ</h1>
                <div class="header-right">
                    <div id="user-info" class="user-info" style="display: none;">
                        <span class="user-company" id="display-company">読み込み中...</span>
                        <span class="user-email" id="display-email">読み込み中...</span>
                        <button class="btn-logout" onclick="handleLogout()" title="ログアウト">🚪</button>
                    </div>
                    <nav class="nav">
                        <a href="index.html" class="nav-link">報告入力</a>
                        <a href="dashboard.html" class="nav-link active">ダッシュボード</a>
                        <a href="analytics.html" class="nav-link">分析</a>
                        <a href="admin.html" class="nav-link" id="admin-link">企業管理</a>
                        <a href="admin-reports.html" class="nav-link" id="admin-reports-link">報告管理</a>
                        <a href="admin-users.html" class="nav-link" id="admin-users-link">ユーザー管理</a>
                        <a href="import-data.html" class="nav-link" id="import-data-link">📥 データインポート</a>
                        <a href="admin-data-fix.html" class="nav-link" id="data-fix-link">🔧 データ修正</a>
                    </nav>
                </div>
            </div>
        </header>

        <main class="main-content dashboard-content">
            <div class="dashboard-header">
                <h1>管理者ダッシュボード</h1>
                <div class="filter-controls" style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                    <select id="status-filter" class="form-control" style="flex: 0 0 auto; min-width: 150px;">
                        <option value="">すべてのステータス</option>
                        <option value="step1_complete">基本情報のみ</option>
                        <option value="step2_complete">詳細入力済</option>
                        <option value="confirmed">確認済</option>
                        <option value="in_progress">対応中</option>
                        <option value="completed">完了</option>
                    </select>
                    <select id="category-filter" class="form-control" style="flex: 0 0 auto; min-width: 150px;">
                        <option value="">すべてのカテゴリ</option>
                        <option value="driving">走行中</option>
                        <option value="loading">荷役中</option>
                    </select>
                    <select id="severity-filter" class="form-control" style="flex: 0 0 auto; min-width: 120px;">
                        <option value="">すべての重大度</option>
                        <option value="1">重大度 1</option>
                        <option value="2">重大度 2</option>
                        <option value="3">重大度 3</option>
                        <option value="4">重大度 4</option>
                        <option value="5">重大度 5</option>
                    </select>
                    <div style="display: flex; align-items: center; gap: 5px; flex: 0 0 auto; white-space: nowrap;">
                        <input type="date" id="date-from-filter" class="form-control" placeholder="開始日" style="width: 150px;">
                        <span style="color: #666;">〜</span>
                        <input type="date" id="date-to-filter" class="form-control" placeholder="終了日" style="width: 150px;">
                    </div>
                    <input type="text" id="reporter-filter" class="form-control" placeholder="報告者名で検索" style="flex: 0 0 auto; min-width: 150px;">
                    <button class="btn btn-primary" onclick="applyAdvancedFilter()">🔍 フィルタ適用</button>
                    <button class="btn btn-secondary" onclick="resetAllFilters()">🔄 リセット</button>
                    <button class="btn btn-success" onclick="openExportColumnsModal()">📊 データエクスポート</button>
                </div>
            </div>

            <!-- サマリーカード -->
            <div class="summary-grid">
                <div class="summary-card">
                    <div class="summary-icon">📊</div>
                    <div class="summary-content">
                        <h3>総報告数</h3>
                        <p class="summary-number" id="total-reports">0</p>
                    </div>
                </div>
                <div class="summary-card pending-card">
                    <div class="summary-icon">⚠️</div>
                    <div class="summary-content">
                        <h3>未確認</h3>
                        <p class="summary-number" id="pending-reports">0</p>
                    </div>
                </div>
                <div class="summary-card warning-card">
                    <div class="summary-icon">🔴</div>
                    <div class="summary-content">
                        <h3>重大度★★★以上</h3>
                        <p class="summary-number" id="high-severity">0</p>
                    </div>
                </div>
                <div class="summary-card success-card">
                    <div class="summary-icon">✓</div>
                    <div class="summary-content">
                        <h3>今月の完了</h3>
                        <p class="summary-number" id="completed-reports">0</p>
                    </div>
                </div>
            </div>

            <!-- 報告リスト -->
            <div class="card">
                <h2 class="section-title">報告一覧</h2>
                
                <div id="reports-list">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 NLP協同組合</p>
        </footer>
    </div>

    <!-- 詳細モーダル -->
    <div id="detail-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">報告詳細</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- 詳細内容が動的に挿入されます -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">閉じる</button>
                <button class="btn btn-success" onclick="updateStatus()">ステータス更新</button>
            </div>
        </div>
    </div>

    <!-- カスタム列選択モーダル -->
    <div id="export-columns-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2>📊 エクスポート列の選択</h2>
                <button class="modal-close" onclick="closeExportColumnsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="color: #666; margin-bottom: 20px;">エクスポートする列を選択してください。</p>
                
                <!-- プリセットボタン -->
                <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="selectPreset('basic')">📋 基本項目</button>
                    <button class="btn btn-primary" onclick="selectPreset('detailed')">📊 詳細項目</button>
                    <button class="btn btn-primary" onclick="selectPreset('all')">📁 全項目</button>
                    <button class="btn btn-secondary" onclick="selectPreset('none')">🔲 すべて解除</button>
                </div>
                
                <!-- 列選択チェックボックス -->
                <div style="max-height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; border-radius: 8px;">
                    <div id="columns-checkboxes" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px;">
                        <!-- チェックボックスが動的に追加されます -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeExportColumnsModal()">キャンセル</button>
                <button class="btn btn-success" onclick="executeExportWithColumns('csv')">📥 CSVエクスポート</button>
                <button class="btn btn-success" onclick="executeExportWithColumns('excel')" style="background: #10b981;">📊 Excelエクスポート</button>
                <button class="btn btn-success" onclick="executeExportWithColumns('pdf')" style="background: #ef4444;">📄 PDFエクスポート</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="js/config.js?v=20260226"></script>
    <script src="js/dashboard.js?v=20260412b"></script>
</body>
</html>
